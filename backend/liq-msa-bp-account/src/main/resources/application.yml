---
# Configuración para perfil Docker
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    # Use environment-provided JDBC URL when running in Docker (set in docker-compose)
    url: jdbc:postgresql://localhost:5432/savanna_db_dev
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      validation-timeout: 5000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: false
      connection-test-query: SELECT 1
      transaction-isolation: TRANSACTION_READ_COMMITTED
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        show_sql: false
        use_sql_comments: false
        order_updates: true
        order_inserts: true
        jdbc:
          lob:
            non_contextual_creation: true
          batch_size: 10
    open-in-view: false

logging:
  level:
    org.springframework.transaction: INFO
    org.hibernate.SQL: INFO
    org.springframework.orm.jpa: INFO
    root: INFO
