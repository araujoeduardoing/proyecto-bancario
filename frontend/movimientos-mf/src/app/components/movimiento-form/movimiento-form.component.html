@if (isVisible()) {
  <div class="movimiento-form">
    <div class="form-container">
      <h3>
        {{ isEditing() ? "Editar Movimiento" : "Crear Nuevo Movimiento" }}
      </h3>

      <form (ngSubmit)="onSubmit()" #movimientoForm="ngForm">
        <div class="form-group">
          <label for="clientId">Cliente*:</label>
          <select
            id="clientId"
            (change)="updateField('clientId', +$any($event.target).value)"
            required
            [class.error]="formData().clientId === 0 && !loadingClients()"
            [disabled]="loadingClients()"
          >
            <option value="0" disabled [selected]="formData().clientId === 0">
              {{
                loadingClients()
                  ? "Cargando clientes..."
                  : "Seleccione un cliente"
              }}
            </option>
            @for (client of clients(); track client.clientId) {
              <option
                [value]="client.clientId"
                [selected]="formData().clientId === client.clientId"
              >
                {{ client.name }} - {{ client.identification }}
              </option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="accountId">Cuenta*:</label>
          <select
            id="accountId"
            (change)="updateField('accountId', +$any($event.target).value)"
            required
            [class.error]="formData().accountId === 0 && !loadingAccounts()"
            [disabled]="loadingAccounts() || formData().clientId === 0"
          >
            <option value="0" disabled [selected]="formData().accountId === 0">
              {{
                loadingAccounts()
                  ? "Cargando cuentas..."
                  : formData().clientId === 0
                    ? "Seleccione primero un cliente"
                    : "Seleccione una cuenta"
              }}
            </option>
            @for (account of accounts(); track account.id) {
              <option
                [value]="account.id"
                [selected]="formData().accountId === account.id"
              >
                {{ account.accountNumber }} -
                {{ account.accountType | titlecase }} ({{
                  account.initialBalance | currency
                }})
              </option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="movementType">Tipo de Movimiento:</label>
          <select
            id="movementType"
            [value]="formData().movementType"
            (change)="updateField('movementType', $any($event.target).value)"
          >
            @for (type of movimientoTypes; track type.value) {
              <option [value]="type.value">{{ type.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="initialBalance">Saldo Inicial (automático):</label>
          <input
            id="initialBalance"
            type="number"
            step="0.01"
            min="0"
            [value]="formData().initialBalance"
            placeholder="Se completa al seleccionar cuenta"
            disabled
            [class.error]="!isFieldValid('initialBalance')"
          />
        </div>

        <div class="form-group">
          <label for="amount">Monto*:</label>
          <input
            id="amount"
            type="number"
            step="0.01"
            [value]="formData().amount"
            (input)="updateField('amount', +$any($event.target).value)"
            placeholder="0.00"
            required
            [class.error]="!isFieldValid('amount')"
          />
        </div>

        <div class="form-group">
          <label for="availableBalance">Saldo Disponible (automático):</label>
          <input
            id="availableBalance"
            type="number"
            step="0.01"
            [value]="formData().availableBalance"
            placeholder="Se calcula automáticamente"
            disabled
            [class.error]="!isFieldValid('availableBalance')"
          />
        </div>

        <div class="form-group">
          <label for="movementStatus">Estado del Movimiento:</label>
          <select
            id="movementStatus"
            [value]="formData().movementStatus"
            (change)="updateField('movementStatus', $any($event.target).value)"
          >
            <option value="ACTIVE">Activo</option>
            <option value="INACTIVE">Inactivo</option>
          </select>
        </div>

        <div class="form-actions">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="
              isSubmitting() ||
              !isFieldValid('clientId') ||
              !isFieldValid('accountId') ||
              !isFieldValid('amount') ||
              !isFieldValid('initialBalance') ||
              !isFieldValid('availableBalance')
            "
          >
            {{
              isSubmitting()
                ? "Guardando..."
                : isEditing()
                  ? "Actualizar"
                  : "Crear"
            }}
          </button>

          <button
            type="button"
            class="btn btn-secondary"
            (click)="onCancel()"
            [disabled]="isSubmitting()"
          >
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>
}
