<div class="movimiento-search">
  <div class="search-container">
    <div class="search-input-group">
      <input
        type="text"
        [value]="searchText"
        (input)="onSearchInput($any($event.target).value)"
        placeholder="Buscar por número de movimiento, cliente o tipo de movimiento..."
        class="search-input"
      />
      @if (hasActiveSearch()) {
        <button
          (click)="onClearSearch()"
          class="clear-button"
          title="Limpiar búsqueda"
        >
          ✕
        </button>
      }
    </div>

    @if (totalMovimientos > 0) {
      <div class="search-info">
        <span class="results-count">
          {{ hasActiveSearch() ? filteredMovimientos : totalMovimientos }}
          de {{ totalMovimientos }} movimiento{{
            totalMovimientos === 1 ? "" : "s"
          }}
        </span>

        @if (hasActiveSearch()) {
          <span class="search-hint"> Filtrando por: "{{ searchText }}" </span>
        }
      </div>
    }
  </div>
</div>
