<div class="app-container">
  <header class="app-header">
    <h1>{{ title() }}</h1>
    <button
      (click)="onShowCreateForm()"
      class="btn btn-primary"
      [disabled]="loading()"
    >
      Crear Nuevo Movimiento
    </button>
  </header>

  @if (error()) {
    <div class="error-message">
      {{ error() }}
    </div>
  }

  <app-movimiento-search
    [searchText]="searchText()"
    [totalMovimientos]="movimientos().length"
    [filteredMovimientos]="filteredMovimientos().length"
    (searchChange)="onSearchChange($event)"
    (clearSearch)="onClearSearch()"
  >
  </app-movimiento-search>

  <app-movimiento-list
    [movimientos]="filteredMovimientos()"
    [loading]="loading()"
    [deleting]="deleting()"
    (editMovimiento)="onEditMovimiento($event)"
    (deleteMovimiento)="onDeleteMovimiento($event)"
  >
  </app-movimiento-list>

  <app-movimiento-form
    [isVisible]="showForm()"
    [isEditing]="editing()"
    [isSubmitting]="creating()"
    [shouldReset]="resetForm()"
    [movimientoToEdit]="editingMovimiento()"
    (submitForm)="onFormSubmit($event)"
    (cancel)="onFormCancel()"
  >
  </app-movimiento-form>
</div>
