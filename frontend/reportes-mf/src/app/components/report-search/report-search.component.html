<div class="report-generator">
  <div class="generator-container">
    <h3>Generar Reporte de Movimientos</h3>

    <div class="form-grid">
      <div class="form-group">
        <label for="clientId">Cliente *</label>
        <select
          id="clientId"
          [(ngModel)]="clientId"
          class="form-select"
          [disabled]="loading || loadingClients()"
        >
          <option [value]="null">Seleccione un cliente</option>
          @for (client of clients(); track client.clientId) {
            <option [value]="client.clientId">
              {{ client.name }} ({{ client.identification }})
            </option>
          }
        </select>
        @if (loadingClients()) {
          <small class="loading-text">Cargando clientes...</small>
        }
      </div>

      <div class="form-group">
        <label for="startDate">Fecha de Inicio *</label>
        <input
          id="startDate"
          type="date"
          [(ngModel)]="startDate"
          class="form-input"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="endDate">Fecha de Fin *</label>
        <input
          id="endDate"
          type="date"
          [(ngModel)]="endDate"
          class="form-input"
          [disabled]="loading"
        />
      </div>

      <div class="form-group button-group">
        <div class="button-container">
          <button
            (click)="onGenerateReport()"
            [disabled]="!isValidForm() || loading"
            class="generate-btn"
          >
            @if (loading) {
              <span class="loading-spinner"></span>
              Generando...
            } @else {
              📊 Generar Reporte
            }
          </button>
          
          @if (totalMovements > 0 && !loading) {
            <button
              (click)="onDownloadPdf()"
              class="pdf-btn"
              title="Descargar reporte en PDF"
            >
              📄 Descargar PDF
            </button>
          }
        </div>
      </div>
    </div>

    @if (totalMovements > 0) {
      <div class="report-info">
        <span class="results-count">
          Se encontraron {{ totalMovements }} movimiento{{
            totalMovements === 1 ? "" : "s"
          }}
        </span>
      </div>
    }
  </div>
</div>
