<div class="app-container">
  <header class="app-header">
    <h1>{{ title() }}</h1>
  </header>

  @if (error()) {
    <div class="error-message">
      <span>{{ error() }}</span>
      <button (click)="onClearError()" class="close-error">✕</button>
    </div>
  }

  <app-report-search
    [loading]="loading()"
    [totalMovements]="movements().length"
    (generateReport)="onGenerateReport($event)"
    (downloadPdf)="onDownloadPdf()"
  >
  </app-report-search>

  <app-report-list [movements]="movements()" [loading]="loading()">
  </app-report-list>
</div>
